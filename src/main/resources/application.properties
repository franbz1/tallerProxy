spring.application.name=tallerProxy

spring.datasource.url=jdbc:h2:mem:proxydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Token estimation (documented for frontend parity): ceil(prompt.length / 4) + fixed output estimate
app.token-estimation.fixed-output-tokens=100
app.timezone=America/Bogota

# CORS: comma-separated origins (your frontend dev URL). Override via env APP_CORS_ALLOWED_ORIGINS or a .env file + scripts/run-jar-with-env.ps1
app.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
