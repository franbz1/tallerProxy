services:
  taller-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: taller-proxy:local
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: ""
      # Browsers call the API from the page origin; set to your frontend URL(s), comma-separated.
      # APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    # H2 is in-memory; data is lost when the container stops (expected for this workshop app).
